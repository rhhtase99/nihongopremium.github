<!DOCTYPE html>
<html lang="id" data-season="default" class="transition-colors duration-700">

    <!-- Tailwind CSS with Custom Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        appbg: 'var(--bg-app)',
                        accent: 'var(--accent)',
                        glass: 'var(--glass-bg)',
                        glassborder: 'var(--glass-border)'
                    },
                    animation: {
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                        'bounce-sm': 'bounce-sm 0.5s ease infinite alternate'
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-2px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(4px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-6px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(6px, 0, 0)' }
                        },
                        'bounce-sm': {
                            '0%': { transform: 'translateY(0)' },
                            '100%': { transform: 'translateY(-4px)' }
                        }
                    }
                }
            }
        }
    </script>
    <!-- Font Inter & Noto Sans JP -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->

    <style>
        :root {

        .dark[data-season="natsu"] { --bg-app: #0F292E; --accent: #38BDF8; --glass-bg: rgba(15, 41, 46, 0.75); --glass-border: rgba(56, 189, 248, 0.15); }

            border-color: rgba(255,255,255,0.68);

            border-color: rgba(118, 234, 255, 0.32);

        [data-season="xpaero"] button.bg-accent,
        [data-season="xpaero"] .bg-accent {
            background: linear-gradient(180deg, #61d5ff 0%, #168ff2 48%, #0068c8 49%, #0751a8 100%);

        [data-season="xpaero"] #season-art-bg { opacity: 0; }

        /* iOS 6 BLUE (RETRO PREMIUM) */
        [data-season="ios6"] {

        [data-season="ios6"] body {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.92)) top / 100% 96px no-repeat,
                radial-gradient(circle at 18% 10%, rgba(255,255,255,0.9) 0 5%, transparent 18%),

                linear-gradient(180deg, rgba(24,43,64,0.96), rgba(24,43,64,0.96)) top / 100% 96px no-repeat,

            border-color: rgba(142, 167, 192, 0.44);

            border-color: rgba(132, 174, 214, 0.36);

        }
        [data-season="ios6"] #bottom-nav {
            background: linear-gradient(180deg, rgba(252,254,255,0.97) 0%, rgba(229,237,246,0.95) 48%, rgba(199,215,232,0.94) 49%, rgba(242,247,252,0.95) 100%);
        }
        .dark[data-season="ios6"] #bottom-nav {
            background: linear-gradient(180deg, rgba(54,74,98,0.96) 0%, rgba(34,50,68,0.95) 48%, rgba(20,32,46,0.95) 49%, rgba(38,55,73,0.96) 100%);
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: var(--bg-app);
            color: var(--text-main);
            transition: background-color 0.7s ease, color 0.7s ease;
        }
        
        /* Unified iOS Glassmorphism */
        .ios-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 24px -12px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .dark .ios-glass, [data-season="space"] .ios-glass { box-shadow: 0 4px 24px -12px rgba(0,0,0,0.3); }

        .text-accent { color: var(--accent); }
        .text-main { color: var(--text-main); }
        .bg-accent { background-color: var(--accent); }
        .bg-accent-light { background-color: color-mix(in srgb, var(--accent) 15%, transparent); }
        .border-accent { border-color: var(--accent); }

        .ios-btn-press:active { transform: scale(0.95); filter: brightness(0.9); }
        #bottom-nav {
            position: fixed !important;
            left: 50% !important;
            right: auto !important;
            bottom: max(1.25rem, env(safe-area-inset-bottom)) !important;
            transform: translate3d(-50%, 0, 0);
            will-change: opacity, transform;
            transition: opacity 0.8s ease, transform 0.35s ease, background 0.35s ease, border-color 0.35s ease;
        }
        #bottom-nav button { min-width: 0; position: relative; z-index: 1; pointer-events: auto; }
        [data-orientation-view="landscape"] #main-app { max-width: min(58rem, 100vw); }
        [data-orientation-view="landscape"] #app-viewport { width: 100%; }
        [data-orientation-view="landscape"] #bottom-nav { max-width: min(44rem, 92vw); }
        [data-orientation-view="landscape"] #theme-modal > div,
        [data-orientation-view="landscape"] #shop-modal > div,
        [data-orientation-view="landscape"] #profile-modal > div,
        [data-orientation-view="landscape"] #progress-modal > div { max-width: min(44rem, 100vw); }
        
        /* Seasonal Background Art Layer */
        #season-art-bg {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60vh; pointer-events: none; z-index: 0;
            background-size: cover; background-position: bottom center; background-repeat: no-repeat;
            opacity: 0.15; transition: opacity 1s ease, background-image 1s ease;
        }
        .dark #season-art-bg, [data-season="space"] #season-art-bg { opacity: 0.08; }
        [data-season="natal"] #season-art-bg { opacity: 0.34; }
        .dark[data-season="natal"] #season-art-bg { opacity: 0.26; }

        /* Seasonal Particles */
        .season-element { position: absolute; pointer-events: none; opacity: 0.6; z-index: 1; }
        @keyframes floatDown { 0% { transform: translateY(-5vh) rotate(0deg) translateX(0); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(105vh) rotate(360deg) translateX(30px); opacity: 0; } }
        @keyframes floatUp { 0% { transform: translateY(105vh) scale(0.5); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-5vh) scale(1.2); opacity: 0; } }
        @keyframes floatSpace { 0% { transform: translateY(105vh) rotate(0deg) scale(0.8); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-10vh) rotate(180deg) scale(1.2); opacity: 0; } }
        @keyframes merryBlink { 0%, 100% { opacity: 0.35; filter: brightness(0.8); } 50% { opacity: 1; filter: brightness(1.8); } }
        
        .particle-down { animation: floatDown linear infinite; position: absolute; pointer-events: none; }
        .particle-up { animation: floatUp linear infinite; position: absolute; pointer-events: none; }
        .particle-space { animation: floatSpace linear infinite; position: absolute; pointer-events: none; }
        .particle-blink { animation: merryBlink ease-in-out infinite; position: absolute; pointer-events: none; }
        
        /* Coin Animation */
        @keyframes floatCoin { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-40px) scale(1.5); opacity: 0; } }
        .coin-anim { animation: floatCoin 1s ease-out forwards; position: absolute; font-weight: 900; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.2); z-index: 50;}

        /* Bunpou Word Tokens */
        .word-token { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .word-token.selected { opacity: 0; transform: scale(0.8); pointer-events: none; }

        .timer-progress { transition: width 1s linear; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden relative flex flex-col">

    <!-- Background Layers -->
    <div id="season-art-bg"></div>
    <div id="season-overlay" class="fixed inset-0 pointer-events-none z-1 overflow-hidden"></div>

    <!-- ONBOARDING SCREEN -->
    <div id="onboarding-screen" class="fixed inset-0 z-[100] bg-appbg flex flex-col items-center justify-center p-6 transition-all duration-700">
        <div class="ios-glass p-8 rounded-[3rem] w-full max-w-md shadow-2xl flex flex-col items-center text-center border-accent border">
            <div class="w-24 h-24 bg-accent-light rounded-[2rem] flex items-center justify-center text-accent mb-6 transform rotate-3"><i data-lucide="sparkles" class="w-12 h-12"></i></div>
            <h1 class="text-3xl font-black mb-2 text-main">NihonGo!</h1>
            <p class="text-sm mb-8" style="color: var(--text-muted)">Aplikasi belajar bahasa Jepang premium. Mari atur profilmu sebelum memulai perjalanan.</p>
            <div class="w-full mb-6">
                <label class="text-[10px] font-bold uppercase tracking-widest block mb-2 text-left text-accent">Siapa namamu?</label>
                <input type="text" id="setup-name" class="w-full px-5 py-4 rounded-2xl ios-glass border-none outline-none focus:ring-2 focus:ring-accent text-lg shadow-inner text-main font-bold text-center" placeholder="Ketik nama di sini...">
            </div>
            <div class="w-full mb-8">
                <label class="text-[10px] font-bold uppercase tracking-widest block mb-3 text-left text-accent">Pilih Avatar</label>
                <div class="grid grid-cols-5 gap-2" id="setup-avatars"></div>
            </div>
            <button onclick="finishOnboarding()" class="w-full bg-accent text-white py-4 rounded-2xl font-bold text-lg ios-btn-press flex items-center justify-center gap-2 shadow-xl shadow-blue-500/30">
                Mulai Belajar <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="w-full max-w-md mx-auto flex flex-col min-h-screen relative z-10 px-4 pb-24 pt-4 flex-1 hidden opacity-0 transition-opacity duration-1000">
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-6 z-20">
            <div class="flex items-center gap-3">
                <div id="user-avatar-trigger" onclick="openProfileModal()" class="w-10 h-10 rounded-full ios-glass border border-accent flex items-center justify-center text-xl cursor-pointer ios-btn-press shadow-sm relative">
                    <span id="header-avatar">🌸</span>
                </div>
                <div>
                    <h2 id="header-user-name" onclick="openProfileModal()" class="font-bold text-sm leading-tight cursor-pointer hover:underline text-main">Pelajar Nihon</h2>
                    <!-- COIN DISPLAY -->
                    <div class="flex items-center gap-1 mt-0.5">
                        <span class="text-[10px] uppercase font-bold text-yellow-500" id="header-coin-icon">🪙</span>
                        <span id="header-coins" class="text-xs font-black tracking-widest" style="color: var(--text-muted)">0</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">

        /* ================= WEB AUDIO API ================= */
        class RealTimeSynth {
            constructor() { this.ctx = null; this.isPlaying = false; }
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
            start() { this.init(); if (this.isPlaying) return; this.isPlaying = true; this.scheduler(); }
            stop() { this.isPlaying = false; if (this.timerId) clearTimeout(this.timerId); }
            setExamMode(state) { this.isExamMode = state; }
            
            scheduler() {
                if (!this.isPlaying) return;
                this.playTone();
                let tempo = 90;
                if(this.isExamMode) tempo = 160;
                else if(state.season === 'haru') tempo = 120;
                else if(state.season === 'natsu') tempo = 140;
                else if(state.season === 'aki') tempo = 70;
                else if(state.season === 'fuyu') tempo = 50;
                else if(state.season === 'tropis') tempo = 100;
                else if(state.season === 'space') tempo = 40;
                else if(state.season === 'natal') tempo = 110;
                else if(state.season === 'ios6') tempo = 132;
                else if(state.season === 'xpaero') tempo = 128;

                let step = 60 / tempo * 1000 * (this.isExamMode ? 0.25 : 0.5);
                if ((state.season === 'fuyu' || state.season === 'space') && !this.isExamMode) step += Math.random() * 1000;
                this.timerId = setTimeout(() => this.scheduler(), step);
            }
            
            playTone() {
                if (!this.ctx) return;
                let scale, type, decay, vol = 0.1;
                
                if (this.isExamMode) {
                    scale = [293.66, 311.13, 392.00, 440.00, 466.16]; type = 'triangle'; decay = 0.2; vol = 0.15;
                } else {
                    switch(state.season) {
                        case 'haru': scale = [523.25, 587.33, 698.46, 783.99, 880.00]; type = 'triangle'; decay = 0.8; vol = 0.08; break; 
                        case 'natsu': scale = [261.63, 329.63, 349.23, 392.00, 493.88]; type = 'square'; decay = 0.3; vol = 0.04; break; 
                        case 'aki': scale = [164.81, 174.61, 220.00, 246.94, 261.63]; type = 'sine'; decay = 2.5; vol = 0.12; break; 
                        case 'fuyu': scale = [1046.50, 1174.66, 1244.51, 1567.98, 1661.22]; type = 'sine'; decay = 3.0; vol = 0.03; break; 
                        case 'tropis': scale = [329.63, 392.00, 440.00, 523.25, 587.33]; type = 'sine'; decay = 0.5; vol = 0.1; break; 
                        case 'space': scale = [130.81, 196.00, 261.63, 311.13, 392.00]; type = 'square'; decay = 4.0; vol = 0.05; break; 
                        case 'natal': scale = [329.63, 329.63, 329.63, 392.00, 261.63, 293.66, 349.23]; type = 'sine'; decay = 1.0; vol = 0.15; break; 
                        case 'ios6': scale = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99]; type = 'square'; decay = 0.18; vol = 0.055; break;
                        case 'xpaero': scale = [392.00, 493.88, 523.25, 659.25, 783.99, 987.77]; type = 'triangle'; decay = 0.65; vol = 0.07; break;
                        default: scale = [293.66, 349.23, 392.00, 440.00, 523.25]; type = 'sine'; decay = 1.2; vol = 0.1;
                    }
                }

                let freq = scale[Math.floor(Math.random() * scale.length)];
                if (!this.isExamMode && state.season === 'haru' && Math.random() > 0.7) freq *= 2; 
                if (!this.isExamMode && state.season === 'space' && Math.random() > 0.8) freq /= 2;
                if (!this.isExamMode && state.season === 'ios6' && Math.random() > 0.72) freq *= 1.5;
                if (!this.isExamMode && state.season === 'xpaero' && Math.random() > 0.66) freq *= 2;
                if (this.isExamMode && Math.random() > 0.8) freq /= 2;

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                if (state.season === 'space' && !this.isExamMode) {
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass'; filter.frequency.value = 800;
                    osc.connect(filter); filter.connect(gain);
                } else if (state.season === 'ios6' && !this.isExamMode) {
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'bandpass'; filter.frequency.value = 1800; filter.Q.value = 5;
                    osc.connect(filter); filter.connect(gain);
                } else {
                    osc.connect(gain);
                }
                
                gain.connect(this.ctx.destination);
                osc.type = type;
                
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + decay);
                
                osc.start(); osc.stop(this.ctx.currentTime + decay + 0.1);
            }
        }

        function tapBunpouWord(idx, word) {
            document.getElementById(`avail-word-${idx}`).classList.add('selected');
            bunpouSession.selectedWords.push({ idx: idx, word: word });
            renderBunpouSelected();
        }

        function untapBunpouWord(selIdx) {
            const item = bunpouSession.selectedWords[selIdx];
            document.getElementById(`avail-word-${item.idx}`).classList.remove('selected');
            bunpouSession.selectedWords.splice(selIdx, 1);
            renderBunpouSelected();
        }

        function renderBunpouSelected() {
            const area = document.getElementById('bunpou-selected-area');
            area.innerHTML = bunpouSession.selectedWords.map((sw, selIdx) => `
                <button onclick="untapBunpouWord(${selIdx})" class="animate-fade-in px-4 py-2 bg-accent text-white rounded-xl font-bold shadow-md active:scale-90">${sw.word}</button>
            `).join('');

            updateBunpouButtons();
        }

        function updateBunpouButtons() {
            const btn = document.getElementById('bunpou-check-btn');
            const item = BUNPOU_DB[bunpouSession.bab][bunpouSession.currentIdx];
            const currentQuizData = item.quizzes[bunpouSession.currentQuizIdx];
            const totalWords = currentQuizData.words.length;
            
            if (bunpouSession.selectedWords.length === totalWords) {
                btn.classList.remove('bg-accent/50', 'pointer-events-none');
                btn.classList.add('bg-accent', 'shadow-lg', 'shadow-blue-500/30', 'ios-btn-press');
                btn.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i> Cek Jawaban`;
                lucide.createIcons();
            } else {
                btn.classList.add('bg-accent/50', 'pointer-events-none');
                btn.classList.remove('bg-accent', 'shadow-lg', 'shadow-blue-500/30', 'ios-btn-press');
                btn.innerHTML = `Pilih Kata`;
            }
        }

        function checkBunpou() {
            const item = BUNPOU_DB[bunpouSession.bab][bunpouSession.currentIdx];
            const currentQuizData = item.quizzes[bunpouSession.currentQuizIdx];
            const answerUser = bunpouSession.selectedWords.map(sw => sw.word).join('');
            
            const quizSection = document.getElementById('bunpou-quiz-section');
            const area = document.getElementById('bunpou-selected-area');
            const btn = document.getElementById('bunpou-check-btn');
            const coinIcon = getCoinIcon();

            if (answerUser === currentQuizData.answerStr) {
                playChime(true);
                area.classList.remove('border-dashed', 'border-neutral-400/50');
                area.classList.add('bg-emerald-500/20', 'border-emerald-500');
                
                const tokens = area.querySelectorAll('button');
                tokens.forEach((t, i) => {
                    t.classList.remove('active:scale-90'); t.removeAttribute('onclick');
                    t.classList.replace('bg-accent', 'bg-emerald-500');
                    t.style.animationDelay = `${i * 0.1}s`;
                    t.classList.add('animate-bounce-sm');
                });

                btn.classList.replace('bg-accent', 'bg-emerald-500');
                btn.classList.remove('shadow-blue-500/30');

                // Jika Latihan 1 selesai, lanjut Latihan 2. Jika Latihan 2 selesai, pindah ke pola berikutnya
                if (bunpouSession.currentQuizIdx < 1) {
                    btn.innerHTML = `Benar! <i data-lucide="arrow-right" class="w-5 h-5"></i> Lanjut Latihan 2`;
                    btn.onclick = () => {
                        bunpouSession.currentQuizIdx++;
                        renderBunpouSlide();
                    };
                } else {
                    btn.innerHTML = `Sempurna! <i data-lucide="check-circle" class="w-5 h-5"></i> Pola Berikutnya`;
                    btn.onclick = nextBunpouSlide;
                    
                    if (!state.stats.bunpouCompleted.includes(item.id)) {
                        state.stats.bunpouCompleted.push(item.id);
                        state.coins += 10;
                        showFloatingCoin(btn, 10);
                        updateCoinUI();
                        saveState();
                    }
                }
                lucide.createIcons();

            } else {
                playChime(false);
                quizSection.classList.add('animate-shake');
                area.classList.add('border-red-500', 'bg-red-500/10');
                
                setTimeout(() => {
                    quizSection.classList.remove('animate-shake');
                    area.classList.remove('border-red-500', 'bg-red-500/10');
                }, 400);

                setTimeout(() => {
                    while(bunpouSession.selectedWords.length > 0) untapBunpouWord(0);
                }, 600);
            }
        }

        function nextBunpouSlide() {
            bunpouSession.currentIdx++;
            bunpouSession.currentQuizIdx = 0;
            renderBunpouSlide();
        }

        function startLevelQuiz(l) {
            let p = [], t = "";
            if (l==='hira-dasar') { p=HIRAGANA_DB.seion.filter(x=>x.j); t="Level 1"; }
            else if (l==='hira-dakuon') { p=[...HIRAGANA_DB.seion,...HIRAGANA_DB.dakuon].filter(x=>x.j); t="Level 2"; }
            else if (l==='hira-lengkap') { p=[...HIRAGANA_DB.seion,...HIRAGANA_DB.dakuon,...HIRAGANA_DB.handakuon,...HIRAGANA_DB.yoon].filter(x=>x.j); t="Level 3"; }
            else if (l==='kata-dasar') { p=KATAKANA_DB.seion.filter(x=>x.j); t="Level 4"; }
            else if (l==='kata-lengkap') { 
                const yoon = KATAKANA_DB.yoon || [];
                const toku = KATAKANA_DB.tokushuon || [];
                p=[...KATAKANA_DB.seion,...KATAKANA_DB.dakuon,...KATAKANA_DB.handakuon,...yoon,...toku].filter(x=>x.j); 
                t="Level 5"; 
            }
            else if (l==='campuran') { p=[...HIRAGANA_DB.seion,...KATAKANA_DB.seion].filter(x=>x.j); t="Level 6"; }
            else if (l==='kotoba-campuran') { 
                p=[...KOTOBA_DB[1],...KOTOBA_DB[2],...KOTOBA_DB[3],...KOTOBA_DB[4],...KOTOBA_DB[5],...KOTOBA_DB[6],...KOTOBA_DB[7],...KOTOBA_DB[8],...KOTOBA_DB[9],...KOTOBA_DB[10]]; 
                t="Level 7"; 
            }
            setupQuizFlow(p, t, false);
        }

        function startExamModel(type) {
            let p = [], t = "";
            if (type==='hiragana') { p=[...HIRAGANA_DB.seion,...HIRAGANA_DB.dakuon,...HIRAGANA_DB.handakuon,...HIRAGANA_DB.yoon].filter(x=>x.j); t="Ujian Hiragana"; }
            else if (type==='katakana') { 
                const yoon = KATAKANA_DB.yoon || [];
                const toku = KATAKANA_DB.tokushuon || [];
                p=[...KATAKANA_DB.seion,...KATAKANA_DB.dakuon,...KATAKANA_DB.handakuon,...yoon,...toku].filter(x=>x.j); 
                t="Ujian Katakana"; 
            }
            else { 
                p=[...HIRAGANA_DB.seion,...KATAKANA_DB.seion,...KOTOBA_DB[1],...KOTOBA_DB[2],...KOTOBA_DB[3],...KOTOBA_DB[4],...KOTOBA_DB[5],...KOTOBA_DB[6],...KOTOBA_DB[7],...KOTOBA_DB[8],...KOTOBA_DB[9],...KOTOBA_DB[10]].filter(x=>x.j||x.kana); 
                t="Pro Campuran"; 
            }
            setupQuizFlow(p, t, true);
        }

        function setupQuizFlow(items, title, isExam) {
            if (items.length === 0) return;
            const shuffled = [...items].sort(() => Math.random() - 0.5);
            state.quiz.currentQuestion = 0; state.quiz.questions = shuffled;
            state.quiz.correctCount = 0; state.quiz.wrongCount = 0; state.quiz.total = shuffled.length;
            MusicEngine.setExamMode(isExam);
            renderQuizQuestion(title, isExam);
        }

        function renderQuizQuestion(title, isExam) {
            const q = state.quiz.currentQuestion; const item = state.quiz.questions[q];
            const isKotoba = !!item.arti; 
            let wp = [];

            if (isKotoba) {
                const all = [...KOTOBA_DB[1],...KOTOBA_DB[2],...KOTOBA_DB[3],...KOTOBA_DB[4],...KOTOBA_DB[5],...KOTOBA_DB[6],...KOTOBA_DB[7],...KOTOBA_DB[8],...KOTOBA_DB[9],...KOTOBA_DB[10]];
                wp = all.filter(x => x.arti !== item.arti).map(x => x.arti);
            } else {
                const all = [...HIRAGANA_DB.seion,...HIRAGANA_DB.dakuon,...KATAKANA_DB.seion,...KATAKANA_DB.dakuon];
                wp = all.filter(x => x.r && x.r !== item.r).map(x => x.r);
            }
            wp = [...new Set(wp)].sort(() => Math.random() - 0.5);
            
            const correct = isKotoba ? item.arti : item.r;
            const choices = [correct, ...wp.slice(0, 3)].sort(() => Math.random() - 0.5);
            const symbol = isKotoba ? (item.kanji && item.kanji !== item.kana ? `${item.kanji}<br><span class="text-2xl mt-1 block opacity-60">${item.kana}</span>` : item.kana) : item.j;
            const isSuperHard = (isExam && state.examDifficulty === 'hard');

            document.getElementById('app-viewport').innerHTML = `
                <div class="animate-fade-in flex flex-col justify-between h-full space-y-5 pb-24 relative">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold uppercase tracking-widest" style="color: var(--text-muted)">${title}</span>
                        <span class="text-xs font-bold bg-accent-light text-accent px-3 py-1 rounded-full">${q + 1} / ${state.quiz.total}</span>
                    </div>

                    <div id="timer-wrap" class="${isSuperHard ? 'block' : 'hidden'} w-full h-1.5 bg-glassborder rounded-full overflow-hidden relative">
                        <div id="timer-bar" class="h-full bg-red-500 timer-progress absolute left-0 top-0" style="width: 100%"></div>
                    </div>

                    <div id="q-card" class="ios-glass p-8 rounded-[2.5rem] ${isSuperHard ? 'border-red-400/50' : 'border-accent'} text-center flex flex-col justify-center min-h-[180px] transition-all relative">
                        <span class="text-6xl font-black select-none leading-none text-main">${symbol}</span>
                        <span id="q-hint" class="text-xs mt-4" style="color: var(--text-muted)">${isKotoba ? 'Pilih arti yang tepat' : 'Cara membacanya?'}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3" id="c-grid">
                        ${choices.map((ch, idx) => `
                            <button onclick="submitQuizAnswer('${ch.replace(/'/g,"\\'")}', '${correct.replace(/'/g,"\\'")}', this)" class="p-5 ios-glass hover:bg-accent-light hover:border-accent active:scale-95 text-sm font-bold rounded-[1.8rem] text-left flex flex-col gap-2 transition-all relative">
                                <span class="text-[10px] uppercase tracking-widest text-accent">${['A','B','C','D'][idx]}</span>
                                <span class="leading-snug capitalize text-main">${ch}</span>
                            </button>
                        `).join('')}
                    </div>

                    <div class="flex justify-between items-center text-xs font-bold px-1" style="color: var(--text-muted)">
                        <span class="flex items-center gap-1.5"><i data-lucide="check-circle" class="w-4 h-4 text-emerald-500"></i> ${state.quiz.correctCount}</span>
                        <span class="flex items-center gap-1.5"><i data-lucide="x-circle" class="w-4 h-4 text-red-500"></i> ${state.quiz.wrongCount}</span>
                    </div>
                </div>`;
            lucide.createIcons();

            if (isSuperHard) {
                let tl = 5; 
                setTimeout(() => { document.getElementById('timer-bar').style.width = '0%'; }, 50); 
                state.quiz.timerObj = setInterval(() => {
                    tl--;
                    if (tl <= 0) { clearInterval(state.quiz.timerObj); state.quiz.timerObj = null; submitQuizAnswer(null, correct, null); }
                }, 1000);
            }
        }

        function showFloatingCoin(element, amount) {
            const rect = element.getBoundingClientRect();
            const floater = document.createElement('div');
            const coinIcon = getCoinIcon();
            floater.className = 'coin-anim text-yellow-500';
            floater.innerHTML = `+${amount} ${coinIcon}`;
            floater.style.left = (rect.left + rect.width/2 - 20) + 'px';
            floater.style.top = rect.top + 'px';
            document.body.appendChild(floater);
            setTimeout(() => floater.remove(), 1000);
        }

        function submitQuizAnswer(chosen, correct, btn) {
            if (state.quiz.timerObj) { clearInterval(state.quiz.timerObj); state.quiz.timerObj = null; }
            const btns = document.querySelectorAll('#c-grid button');
            btns.forEach(b => b.removeAttribute('onclick'));

            const isT = chosen === null; const isC = chosen === correct;
            const currentItem = state.quiz.questions[state.quiz.currentQuestion];
            const isKotoba = !!currentItem.arti;
            
            if (isC && !isT) {
                state.quiz.correctCount++; state.stats.correct++;
                
                const coinEarned = isKotoba ? 10 : 5;
                state.coins += coinEarned;
                updateCoinUI();
                
                if(btn) { 
                    btn.classList.remove('ios-glass'); 
                    btn.style.backgroundColor = 'rgba(16, 185, 129, 0.2)'; 
                    btn.style.borderColor = '#10B981'; 
                    showFloatingCoin(btn, coinEarned);
                }
                playChime(true);
            } else {
                state.quiz.wrongCount++; state.stats.wrong++;
                if (btn) { btn.classList.remove('ios-glass'); btn.style.backgroundColor = 'rgba(239, 68, 68, 0.2)'; btn.style.borderColor = '#EF4444'; }
                if (isT) {
                    document.getElementById('q-hint').innerText = "Waktu Habis!";
                    document.getElementById('q-hint').classList.add('text-red-500');
                    document.getElementById('q-card').style.borderColor = '#EF4444';
                }
                btns.forEach(b => {
                    if (b.querySelector('span:last-child').innerText.toLowerCase() === correct.toLowerCase()) {
                        b.classList.remove('ios-glass'); b.style.backgroundColor = 'rgba(16, 185, 129, 0.2)'; b.style.borderColor = '#10B981';
                    }
                });
                playChime(false);
            }
            saveState();

            setTimeout(() => {
                state.quiz.currentQuestion++;
                if (state.quiz.currentQuestion < state.quiz.total) renderQuizQuestion(document.querySelector('.tracking-widest').innerText, MusicEngine.isExamMode);
                else renderQuizResults();
            }, 1200);
        }

        function playChime(success) {
            try {
                const ac = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ac.createOscillator(); const gain = ac.createGain();
                osc.connect(gain); gain.connect(ac.destination);
                if (success) {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, ac.currentTime); osc.frequency.setValueAtTime(783.99, ac.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.12, ac.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.45);
                    osc.start(); osc.stop(ac.currentTime + 0.5);
                } else {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, ac.currentTime); osc.frequency.linearRampToValueAtTime(147, ac.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.1, ac.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
                    osc.start(); osc.stop(ac.currentTime + 0.45);
                }
            } catch(e) {}
        }

        function renderQuizResults() {
            MusicEngine.setExamMode(false);
            const pct = Math.round((state.quiz.correctCount / state.quiz.total) * 100);
            let grade = 'E', color = 'text-red-500';
            if (pct >= 90) { grade = 'A'; color = 'text-emerald-500'; }
            else if (pct >= 80) { grade = 'B'; color = 'text-accent'; }
            else if (pct >= 70) { grade = 'C'; color = 'text-orange-500'; }
            else if (pct >= 60) { grade = 'D'; color = 'text-amber-500'; }

            // Save to history
            state.stats.history.push({
                score: pct, date: new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'}), grade: grade
            });
            saveState();

            document.getElementById('app-viewport').innerHTML = `
                <div class="animate-fade-in space-y-6 pb-24 text-center">
                    <h2 class="text-xl font-bold tracking-tight">Selesai!</h2>
                    <div class="ios-glass p-8 rounded-[3rem] border-accent flex flex-col items-center">
                        <div class="w-36 h-36 rounded-full border-[10px] border-glassborder flex items-center justify-center mb-4"><span class="text-4xl font-black">${pct}%</span></div>
                        <span class="text-6xl font-black ${color} mb-1">${grade}</span>
                        <span class="text-xs font-bold uppercase tracking-widest" style="color: var(--text-muted)">Grade</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="ios-glass p-4 rounded-3xl text-left"><span class="text-[10px] uppercase font-bold" style="color: var(--text-muted)">Benar</span><span class="block text-2xl font-bold text-emerald-500 mt-1">${state.quiz.correctCount}</span></div>
                        <div class="ios-glass p-4 rounded-3xl text-left"><span class="text-[10px] uppercase font-bold" style="color: var(--text-muted)">Salah</span><span class="block text-2xl font-bold text-red-500 mt-1">${state.quiz.wrongCount}</span></div>
                    </div>
                    <button onclick="switchTab('home')" class="w-full bg-accent text-white py-4 rounded-2xl font-bold shadow-md flex items-center justify-center gap-2"><i data-lucide="home" class="w-5 h-5"></i> Kembali Beranda</button>
                </div>`;
            lucide.createIcons();
        }

        /* ================= HELPERS, COINS, & THEME SYSTEM ================= */
        function switchTab(tabId) {
            state.activeTab = tabId; saveState();
            if (tabId !== 'ujian-menu' && state.quiz.currentQuestion === 0) MusicEngine.setExamMode(false);
            if (state.quiz.timerObj) { clearInterval(state.quiz.timerObj); state.quiz.timerObj = null; }
            
            ['home', 'belajar', 'kotoba', 'bunpou', 'latihan', 'ujian'].forEach(b => {
                const el = document.getElementById(`tab-${b}`);
                if (el) {
                    if (b === tabId || (b === 'belajar' && tabId === 'belajar-menu') || (b === 'ujian' && tabId === 'ujian-menu')) {
                        el.className = "flex-1 flex flex-col items-center gap-1 py-1 text-accent scale-110 transition-all duration-300";
                        el.style.color = '';
                    } else {
                        el.className = "flex-1 flex flex-col items-center gap-1 py-1 transition-all duration-300";
                        el.style.color = 'var(--text-muted)';
                    }
                }
            });

            if (tabId === 'home') renderHome();
            else if (tabId === 'belajar-menu') renderBelajarMenu();
            else if (tabId === 'kotoba') renderKotoba();
            else if (tabId === 'bunpou') renderBunpouMenu();
            else if (tabId === 'latihan') renderLatihanTabs();
            else if (tabId === 'ujian-menu') renderUjianTabs();

        function updateThemeBtns() {
            ['light', 'dark', 'auto'].forEach(t => {
                const btn = document.getElementById(`theme-${t}-btn`);
                if(state.theme === t) btn.className = "py-2.5 rounded-xl text-xs font-semibold bg-accent text-white flex justify-center items-center gap-1.5 transition-all";
                else btn.className = "py-2.5 rounded-xl text-xs font-semibold flex justify-center items-center gap-1.5 transition-all opacity-60 text-main";
            });

            ['auto', 'manual'].forEach(mode => {
                const btn = document.getElementById(`orientation-${mode}-btn`);
                if (!btn) return;
                if(state.orientationMode === mode) btn.className = "py-2.5 rounded-xl text-xs font-semibold bg-accent text-white flex justify-center items-center gap-1.5 transition-all";
                else btn.className = "py-2.5 rounded-xl text-xs font-semibold flex justify-center items-center gap-1.5 transition-all opacity-60 text-main";
            });

            const orientationToggle = document.getElementById('orientation-toggle-btn');
            if (orientationToggle) {
                const nextLabel = state.orientationView === 'landscape' ? 'Ubah ke Portrait' : 'Ubah ke Landscape';
                orientationToggle.innerHTML = `<i data-lucide="${state.orientationView === 'landscape' ? 'panel-top' : 'panel-left'}" class="w-4 h-4"></i> ${nextLabel}`;
                orientationToggle.classList.toggle('opacity-50', state.orientationMode === 'auto');
            }
            
            ['default', 'haru', 'natsu', 'aki', 'fuyu'].forEach(s => {
                const btn = document.getElementById(`season-${s}`);
                if (state.season === s) { btn.classList.add('border-accent', 'bg-accent-light'); btn.classList.remove('border-transparent'); }
                else { btn.classList.remove('border-accent', 'bg-accent-light'); btn.classList.add('border-transparent'); }
            });

            const premiumContainer = document.getElementById('premium-themes-container');
            const premiumGrid = document.getElementById('premium-themes-grid');
            const unlockedPremium = SHOP_ITEMS.filter(item => state.unlockedThemes.includes(item.id));
            
            if (unlockedPremium.length > 0) {
                premiumContainer.style.display = 'block';
                premiumGrid.innerHTML = unlockedPremium.map(item => `
